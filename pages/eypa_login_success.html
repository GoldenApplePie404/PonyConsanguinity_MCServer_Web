<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马国记忆登录 - 万驹同源服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounceIn 0.6s ease;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .icon.success {
            color: #28a745;
        }
        
        .icon.loading {
            color: #667eea;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        .message {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .user-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #667eea;
        }
        
        .nickname {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .username {
            font-size: 14px;
            color: #888;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            text-align: left;
            font-size: 12px;
            color: #856404;
        }
        
        .debug-info h3 {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .debug-info pre {
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .countdown {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon loading" id="icon">⏳</div>
        <h1 id="title">正在处理...</h1>
        <p class="message" id="message">请稍候，正在完成登录</p>
        
        <div id="userInfo" class="user-info" style="display: none;">
            <img id="avatar" class="avatar" src="" alt="头像">
            <div class="nickname" id="nickname"></div>
            <div class="username" id="username"></div>
            <span class="badge" id="badge"></span>
        </div>
        
        <a href="../pages/profile.html" class="btn" id="homeBtn" style="display: none;">前往个人中心</a>
        
        <div class="countdown" id="countdown" style="display: none;">
            <span id="countdownNum">5</span>秒后自动跳转...
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const username = urlParams.get('username');
        const nickname = urlParams.get('nickname');
        const avatar = urlParams.get('avatar');
        const role = urlParams.get('role') || 'user';
        const isNew = urlParams.get('is_new') === '1';
        const debugData = urlParams.get('debug');
        
        console.log('=== 马国记忆登录回调 ===');
        console.log('Token:', token ? '存在' : '不存在');
        console.log('Username:', username);
        console.log('Nickname:', nickname);
        console.log('Avatar:', avatar);
        console.log('Is New User:', isNew);
        
        if (token && username) {
            // 存储用户信息（兼容现有登录逻辑）
            const userInfo = {
                username: username,
                role: role,
                token: token
            };
            localStorage.setItem('currentUser', JSON.stringify(userInfo));
            localStorage.setItem('isLoggedIn', 'true');
            
            // 同时存储单独的token和username（用于兼容性）
            localStorage.setItem('authToken', token);
            localStorage.setItem('username', username);
            
            console.log('用户信息已保存到localStorage');
            console.log('保存的用户信息:', userInfo);
            
            document.getElementById('icon').textContent = '✓';
            document.getElementById('icon').className = 'icon success';
            document.getElementById('title').textContent = '登录成功！';
            
            if (isNew) {
                document.getElementById('message').textContent = '欢迎加入万驹同源服务器！您的账号已自动创建。';
            } else {
                document.getElementById('message').textContent = '欢迎回来！您已成功登录。';
            }
            
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('avatar').src = avatar || '../assets/img/default_avatar.png';
            document.getElementById('nickname').textContent = nickname || username;
            document.getElementById('username').textContent = '@' + username;
            document.getElementById('badge').textContent = isNew ? '新用户' : '马国记忆用户';
            
            document.getElementById('homeBtn').style.display = 'inline-block';
            document.getElementById('countdown').style.display = 'block';
            
            let countdown = 5;
            const countdownEl = document.getElementById('countdownNum');
            const timer = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(timer);
                    // 如果是新用户，跳转到完善信息页面
                    if (isNew) {
                        window.location.href = 'complete_profile.html?token=' + token + '&username=' + username + '&is_new=1';
                    } else {
                        window.location.href = '../pages/profile.html';
                    }
                }
            }, 1000);
            
        } else {
            document.getElementById('icon').textContent = '✗';
            document.getElementById('icon').className = 'icon';
            document.getElementById('icon').style.color = '#dc3545';
            document.getElementById('title').textContent = '登录失败';
            document.getElementById('message').textContent = '未能获取登录信息，请重试';
            document.getElementById('homeBtn').style.display = 'inline-block';
            document.getElementById('homeBtn').textContent = '返回重试';
        }
    </script>
</body>
</html>
