<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马国记忆登录 - 万驹同源服务器</title>
    <link rel="stylesheet" href="../css/font-awesome/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: url('../assets/img/bg.webp') center/cover fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 44px 40px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.6);
            animation: containerPop 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes containerPop {
            from { opacity:0; transform:scale(0.92) translateY(16px); }
            to   { opacity:1; transform:scale(1) translateY(0); }
        }

        .icon-wrap {
            width: 72px; height: 72px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px; font-size: 30px;
        }
        .icon-wrap.loading {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            animation: spin 1s linear infinite;
        }
        .icon-wrap.success {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #fff;
            animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        .icon-wrap.fail {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
        @keyframes popIn {
            0%   { transform:scale(0) rotate(-30deg); }
            60%  { transform:scale(1.15) rotate(5deg); }
            100% { transform:scale(1) rotate(0); }
        }

        h1 { color:#2c3e50; margin-bottom:10px; font-size:24px; font-weight:700; }
        .message { color:#888; margin-bottom:24px; line-height:1.7; font-size:14px; }

        .user-card {
            background: rgba(248,249,250,0.8);
            backdrop-filter: blur(8px);
            border-radius: 14px; padding: 18px 20px;
            margin-bottom: 24px; border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 16px; text-align: left;
        }
        .user-card img {
            width: 54px; height: 54px; border-radius: 50%;
            border: 3px solid #667eea; object-fit: cover; flex-shrink:0;
            box-shadow: 0 3px 10px rgba(102,126,234,0.2);
        }
        .user-card .info { flex:1; min-width:0; }
        .user-card .nickname { font-size:17px; font-weight:700; color:#2c3e50; }
        .user-card .username { font-size:13px; color:#999; margin-top:2px; }
        .user-card .badge {
            display: inline-block; margin-top:6px;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color:#fff; padding:2px 10px; border-radius:10px; font-size:11px;
        }

        .btn-ghost {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 32px; border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; text-decoration: none; font-weight: 600; font-size: 15px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(102,126,234,0.3);
        }
        .btn-ghost:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102,126,234,0.45);
        }

        .countdown { margin-top: 14px; color: #bbb; font-size: 13px; }
        .countdown span { color: #667eea; font-weight:700; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 加载态 -->
        <div id="loadingState">
            <div class="icon-wrap loading"><i class="fas fa-spinner"></i></div>
            <h1>正在处理...</h1>
            <p class="message">请稍候，正在完成登录</p>
        </div>

        <!-- 成功态 -->
        <div id="successState" class="hidden">
            <div class="icon-wrap success"><i class="fas fa-check"></i></div>
            <h1 id="successTitle">登录成功！</h1>
            <p class="message" id="successMsg">欢迎回来！您已成功登录。</p>

            <div id="userInfo" class="user-card hidden">
                <img id="avatar" src="" alt="头像">
                <div class="info">
                    <div class="nickname" id="nickname"></div>
                    <div class="username" id="displayUsername"></div>
                    <span class="badge" id="userBadge">马国记忆用户</span>
                </div>
            </div>

            <a href="../pages/profile.html" class="btn-ghost"><i class="fas fa-arrow-right"></i> 前往个人中心</a>
            <div class="countdown"><span id="countdownNum">5</span> 秒后自动跳转...</div>
        </div>

        <!-- 失败态 -->
        <div id="failState" class="hidden">
            <div class="icon-wrap fail"><i class="fas fa-times"></i></div>
            <h1>登录失败</h1>
            <p class="message" id="failMsg">未能获取登录信息，请重试</p>
            <a href="../pages/login.html" class="btn-ghost"><i class="fas fa-redo"></i> 返回重试</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const username = params.get('username');
        const nickname = params.get('nickname');
        const avatar = params.get('avatar');
        const role = params.get('role') || 'user';
        const isNew = params.get('is_new') === '1';

        document.getElementById('loadingState').classList.add('hidden');

        if (token && username) {
            const userInfo = {
                username: username,
                role: role,
                token: token
            };
            localStorage.setItem('currentUser', JSON.stringify(userInfo));
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('authToken', token);
            localStorage.setItem('username', username);

            document.getElementById('successState').classList.remove('hidden');

            if (isNew) {
                document.getElementById('successTitle').textContent = '欢迎加入！';
                document.getElementById('successMsg').textContent = '您的账号已通过马国记忆自动创建。';
            } else {
                document.getElementById('successTitle').textContent = '登录成功！';
                document.getElementById('successMsg').textContent = '欢迎回来，' + (nickname || username);
            }

            const info = document.getElementById('userInfo');
            info.classList.remove('hidden');
            document.getElementById('avatar').src = avatar || '../assets/img/user.webp';
            document.getElementById('avatar').onerror = function() { this.src = '../assets/img/user.webp'; };
            document.getElementById('nickname').textContent = nickname || username;
            document.getElementById('displayUsername').textContent = '@' + username;
            document.getElementById('userBadge').textContent = isNew ? '新用户' : '马国记忆用户';

            let count = 5;
            const el = document.getElementById('countdownNum');
            const timer = setInterval(() => {
                count--;
                el.textContent = count;
                if (count <= 0) {
                    clearInterval(timer);
                    const target = isNew
                        ? 'complete_profile.html?token=' + encodeURIComponent(token) + '&username=' + encodeURIComponent(username) + '&is_new=1'
                        : '../pages/profile.html';
                    window.location.href = target;
                }
            }, 1000);
        } else {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('failState').classList.remove('hidden');
            document.getElementById('failMsg').textContent = '未能获取登录信息（缺少token或用户名），请重试';
        }
    </script>
</body>
</html>
