<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完善账户信息 - 万驹同源服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .password-strength {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }
        
        .password-strength.weak {
            color: #dc3545;
        }
        
        .password-strength.medium {
            color: #ffc107;
        }
        
        .password-strength.strong {
            color: #28a745;
        }
        
        .skip-btn {
            background: transparent;
            color: #666;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
        
        .skip-btn:hover {
            background: #f8f9fa;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔐</div>
        <h1>完善账户信息</h1>
        <p>为了确保您的账户安全，请设置密码和邮箱。这些信息将用于密码找回和重要通知。</p>
        
        <form id="completeForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" placeholder="请输入邮箱地址" required>
            </div>
            
            <div class="form-group">
                <label for="password">设置密码</label>
                <input type="password" id="password" placeholder="请设置密码（至少6位）" required oninput="checkPasswordStrength(this.value)">
                <div id="passwordStrength" class="password-strength">密码强度：请输入密码</div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">保存信息</button>
            <button type="button" class="btn skip-btn" onclick="skipSetup()">暂不设置</button>
        </form>
        
        <div id="message" class="message" style="display: none;"></div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const username = urlParams.get('username');
        const isNew = urlParams.get('is_new') === '1';
        
        console.log('=== 完善账户信息 ===');
        console.log('Token:', token ? '存在' : '不存在');
        console.log('Username:', username);
        console.log('Is New:', isNew);
        
        if (!token || !username) {
            showMessage('缺少必要参数，请重新登录', 'error');
            document.getElementById('submitBtn').disabled = true;
        }
        
        function checkPasswordStrength(password) {
            const strengthElement = document.getElementById('passwordStrength');
            let strength = 'weak';
            let message = '密码强度：弱';
            
            if (password.length >= 6) {
                if (password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    strength = 'strong';
                    message = '密码强度：强';
                } else {
                    strength = 'medium';
                    message = '密码强度：中';
                }
            }
            
            strengthElement.textContent = message;
            strengthElement.className = `password-strength ${strength}`;
        }
        
        async function handleSubmit(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('密码长度不能少于6位', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '保存中...';
            
            try {
                const response = await fetch('../api/complete_profile.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        email: email,
                        password: password
                    })
                });
                
                const result = await response.json();
                console.log('保存结果:', result);
                
                if (result.success) {
                    showMessage('账户信息已完善，正在跳转到首页...', 'success');
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                } else {
                    showMessage(result.message || '保存失败，请重试', 'error');
                }
            } catch (error) {
                console.error('保存失败:', error);
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '保存信息';
            }
        }
        
        function skipSetup() {
            if (confirm('确定要跳过设置吗？您可以稍后在个人资料页面完善信息。')) {
                window.location.href = '../index.html';
            }
        }
        
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
