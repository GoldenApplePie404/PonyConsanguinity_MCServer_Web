<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="icon" type="image/png" href="../assets/img/m.png">
    <link rel="shortcut icon" href="../assets/img/m.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 万驹同源</title>
    <link rel="stylesheet" href="../css/style.css?v=3.22">
    <link rel="stylesheet" href="../css/modal.css?v=1.0">
    <link rel="stylesheet" href="../css/forum.css?v=1.0">
    <link rel="stylesheet" href="../css/sidebar-player.css?v=2.0">
    <link rel="stylesheet" href="../css/back-to-top.css?v=1.0">
    <link rel="stylesheet" href="../css/font-awesome/all.min.css">
    <link rel="stylesheet" href="../lib/custom-highlight.css">
    <link rel="stylesheet" href="../lib/katex.min.css">
    <script src="../lib/marked.min.js"></script>
    <script src="../lib/highlight.min.js"></script>
    <script src="../lib/powershell.min.js"></script>
    <script src="../lib/mermaid.min.js"></script>
    <script src="../lib/katex.min.js"></script>
    <style>
        /* 增加文章内容区域宽度 */
        .container {
            max-width: 1400px;
        }

        /* 覆盖全局表格行悬停效果，禁用右移动画 */
        .post-content table tr:hover {
            transform: none !important;
        }

        .post-content table tr {
            transition: background-color 0.3s ease;
        }

        /* 帖子布局 - 左右布局 */
        .post-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* 左侧目录侧边栏 */
        .toc-sidebar {
            flex-shrink: 0;
            width: 280px;
            position: sticky;
            top: 80px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        /* 右侧主要内容 */
        .post-main {
            flex: 1;
            min-width: 0;
        }

        /* 目录样式 */
        .toc-container {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
        }

        .toc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }

        .toc-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
        }

        .toc-toggle {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 1rem;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .toc-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .toc-content {
            max-height: 400px;
            overflow-y: auto;
            transition: max-height 0.3s ease;
        }

        .toc-content.collapsed {
            max-height: 0;
            overflow: hidden;
        }

        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .toc-item {
            padding: 8px 12px;
            margin: 4px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .toc-item:hover {
            background: #e8f4f8;
            border-left-color: var(--primary-color);
        }

        .toc-item.active {
            background: #e8f4f8;
            border-left-color: var(--primary-color);
            font-weight: bold;
        }

        .toc-level-1 {
            padding-left: 12px;
            font-size: 0.95rem;
        }

        .toc-level-2 {
            padding-left: 24px;
            font-size: 0.9rem;
        }

        .toc-level-3 {
            padding-left: 36px;
            font-size: 0.85rem;
        }

        .toc-link {
            color: #333;
            text-decoration: none;
            display: block;
        }

        .toc-link:hover {
            color: var(--primary-color);
        }

        .toc-empty {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .post-layout {
                flex-direction: column;
            }

            .toc-sidebar {
                width: 100%;
                position: static;
                max-height: none;
                margin-bottom: 20px;
            }

            .toc-content {
                max-height: 300px;
            }
        }

        @media (max-width: 768px) {
            .post-layout {
                gap: 15px;
            }

            .toc-container {
                padding: 15px;
            }

            .toc-title {
                font-size: 1rem;
            }

            .toc-level-1 {
                padding-left: 8px;
                font-size: 0.9rem;
            }
        }

        /* 返回按钮样式 */
        .back-to-forum {
            position: fixed;
            right: 20px;
            bottom: 90px;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .back-to-forum-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .back-to-forum-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: rotate(45deg);
            transition: left 0.7s;
            left: -100%;
        }

        .back-to-forum-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .back-to-forum-btn:hover::before {
            left: 100%;
        }

        .back-to-forum-btn:active {
            transform: scale(0.95);
        }

        .back-to-forum-btn .icon {
            position: relative;
            z-index: 1;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-to-forum-btn .icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* 滚动到评论区按钮样式 */
        .scroll-to-replies {
            position: fixed;
            left: 20px;
            bottom: 90px;
            z-index: 999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .scroll-to-replies-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .scroll-to-replies-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: rotate(45deg);
            transition: left 0.7s;
            left: -100%;
        }

        .scroll-to-replies-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .scroll-to-replies-btn:hover::before {
            left: 100%;
        }

        .scroll-to-replies-btn:active {
            transform: scale(0.95);
        }

        .scroll-to-replies-btn .icon {
            position: relative;
            z-index: 1;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-to-replies-btn .icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* 覆盖回到顶部按钮位置（仅本页面） */
        .back-to-top {
            bottom: 90px !important;
        }

        /* 覆盖滚动到评论区按钮位置 */
        .scroll-to-replies {
            bottom: 20px !important;
        }

        /* 代码块样式 */
        .code-block-wrapper {
            position: relative;
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden;
            background: #282c34;
        }

        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #21252b;
            border-bottom: 1px solid #3e4451;
        }

        .code-language {
            font-size: 12px;
            color: #abb2bf;
            text-transform: uppercase;
            font-weight: 600;
        }

        .code-block-actions {
            display: flex;
            gap: 10px;
        }

        .code-block-btn {
            background: transparent;
            border: 1px solid #5c6370;
            color: #abb2bf;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .code-block-btn:hover {
            background: #3e4451;
            border-color: #abb2bf;
        }

        .code-block-content {
            position: relative;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .code-block-content.collapsed {
            max-height: 200px;
        }

        .code-block-content.expanded {
            max-height: none;
        }

        .code-with-line-numbers {
            display: flex;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .line-numbers {
            flex-shrink: 0;
            padding: 15px 10px 15px 15px;
            background: #21252b;
            border-right: 1px solid #3e4451;
            color: #5c6370;
            text-align: right;
            user-select: none;
            font-size: 13px;
        }

        .line-numbers span {
            display: block;
            min-width: 20px;
            line-height: 1.6;
            height: 22.4px;
            box-sizing: border-box;
        }

        .code-content {
            flex: 1;
            padding: 15px;
            overflow-x: auto;
        }

        .code-content pre {
            margin: 0;
            background: transparent !important;
            padding: 0 !important;
        }

        .code-content code {
            background: transparent !important;
            padding: 0 !important;
            line-height: 1.6;
        }

        .code-content code .hljs-line {
            display: block;
            line-height: 1.6;
            min-height: 22.4px;
        }

        .code-content .code-line {
            display: block;
            line-height: 1.6;
            min-height: 22.4px;
            white-space: pre;
        }

        .code-content .code-line:empty::before {
            content: ' ';
        }

        .code-block-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, #282c34);
            pointer-events: none;
        }

        .code-block-content.collapsed .code-block-overlay {
            display: block;
        }

        .code-block-content.expanded .code-block-overlay {
            display: none;
        }

        /* Mermaid 图表样式 */
        .mermaid-wrapper {
            position: relative;
            margin: 25px 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e8e8e8;
            background: #ffffff;
            transition: all 0.3s ease;
        }

        .mermaid-wrapper:hover {
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.12);
            border-color: #d0d0d0;
        }

        .mermaid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .mermaid-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .mermaid-title-icon {
            width: 20px;
            height: 20px;
        }

        .mermaid-actions {
            display: flex;
            gap: 8px;
        }

        .mermaid-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }

        .mermaid-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .mermaid-btn:active {
            transform: translateY(0);
        }

        .mermaid-btn svg {
            width: 14px;
            height: 14px;
        }

        .mermaid-body {
            padding: 30px;
            background: #fafbfc;
            overflow-x: auto;
            text-align: center;
        }

        .mermaid-body .mermaid {
            display: inline-block;
            min-width: 100%;
        }

        .mermaid-body svg {
            min-width: 600px;
            max-width: 100%;
            height: auto;
            transform: scale(var(--mermaid-scale, 1.0));
            transform-origin: center;
            transition: transform 0.2s ease;
        }

        /* Mermaid 缩放控制 */
        .mermaid-zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f0f2f5;
            border-radius: 6px;
            margin-left: auto;
        }

        .mermaid-zoom-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #4a5568;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .mermaid-zoom-btn:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .mermaid-zoom-btn:active {
            transform: translateY(0);
        }

        .mermaid-zoom-level {
            font-size: 12px;
            color: #4a5568;
            min-width: 45px;
            text-align: center;
            font-weight: 500;
        }

        /* LaTeX 公式样式 */
        .latex-block {
            display: block;
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            background: #f8f9fa;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #e9ecef;
        }

        .latex-block .katex {
            font-size: 1.3em;
        }

        .latex-error {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
        }

        /* 行内公式样式 */
        .post-content .katex {
            font-size: 1.1em;
        }

        /* 暗色模式适配 */
        @media (prefers-color-scheme: dark) {
            .mermaid-wrapper {
                background: #1a1a1a;
                border-color: #333;
            }

            .mermaid-body {
                background: #1e1e1e;
            }

            .latex-block {
                background: #1e1e1e;
                border-color: #333;
            }

            .latex-error {
                background: #2d1f1f;
            }
        }
    </style>
</head>

<body data-components="sidebarPlayer,backToTop,navbar,footer">

    <!-- 导航栏组件 -->
    <div id="app-navbar"></div>

    <!-- 返回论坛按钮 -->
    <div class="back-to-forum">
        <button class="back-to-forum-btn" onclick="window.location.href='forum.html'">
            <span class="icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
            </span>
        </button>
    </div>

    <!-- 滚动到评论区按钮 -->
    <div class="scroll-to-replies">
        <button class="scroll-to-replies-btn" onclick="scrollToReplies()">
            <span class="icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
                </svg>
            </span>
        </button>
    </div>

    <!-- 帖子详情区域 -->
    <div class="section">
        <div class="container">
            <!-- 帖子内容容器（左右布局） -->
            <div class="post-layout" id="post-layout">
                <!-- 左侧目录 -->
                <div class="toc-sidebar" id="toc-sidebar" style="display: none;">
                    <div class="toc-container">
                        <div class="toc-header">
                            <h3 class="toc-title">目录</h3>
                            <button class="toc-toggle" id="toc-toggle" onclick="toggleTOC()">收起</button>
                        </div>
                        <div class="toc-content" id="toc-content">
                            <ul class="toc-list" id="toc-list">
                                <!-- 目录项将在这里动态生成 -->
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- 右侧内容 -->
                <div class="post-main">
                    <div class="card fade-in" id="post-detail">
                        <div class="card-header">
                            <h2 id="post-title">加载中...</h2>
                        </div>
                        <div class="card-body">
                            <p class="post-meta" id="post-meta">加载中...</p>
                            <div class="post-content-container">
                                <div id="post-content" class="post-content">加载中...</div>
                            </div>
                            <div class="post-actions" id="post-actions">
                                <!-- 操作按钮将在这里显示 -->
                            </div>
                        </div>
                    </div>

                    <!-- 回复区域 -->
                    <div class="card fade-in-delay-1" style="margin-top: 30px;" id="replies-section">
                        <div class="card-header">
                            <h2>回复列表</h2>
                        </div>
                        <div class="card-body">
                            <!-- 回复表单 -->
                            <div class="reply-form" id="reply-form"
                                style="margin-bottom: 30px; padding: 20px; background-color: #f9f9f9; border-radius: 5px;">
                                <h3 style="margin: 0 0 15px 0;">发表回复</h3>
                                <div class="form-group">
                                    <textarea id="reply-content" rows="5" placeholder="请输入回复内容（最多500字）" maxlength="500"
                                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; resize: vertical;"></textarea>
                                    <div style="text-align: right; margin-top: 5px; color: #666; font-size: 0.9rem;">
                                        <span id="reply-char-count">0</span>/500
                                    </div>
                                </div>
                                <button class="btn btn-primary" onclick="submitReply()">提交回复</button>
                            </div>

                            <!-- 回复列表 -->
                            <div id="replies-list">
                                <p style="color: #666; text-align: center; padding: 20px;">加载回复中...</p>
                            </div>
                            <!-- 回复分页控件 -->
                            <div id="replies-pagination" class="pagination"
                                style="margin-top: 20px; text-align: center;">
                                <!-- 分页按钮将在这里动态生成 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑帖子模态框 -->
    <div class="modal" id="edit-post-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>编辑帖子</h2>
                <button class="modal-close" onclick="closeModal('edit-post-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="edit-post-title" placeholder="请输入帖子标题（最多50字）" maxlength="50">
                    <div style="text-align: right; margin-top: 5px; color: #666; font-size: 0.9rem;">
                        <span id="edit-title-char-count">0</span>/50
                    </div>
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <div class="content-wrapper">
                        <div class="content-editor">
                            <textarea id="edit-post-content" rows="15" placeholder="请输入帖子内容（支持Markdown格式）"></textarea>
                            <div style="text-align: right; margin-top: 5px; color: #666; font-size: 0.9rem;">
                                <span id="edit-content-char-count">0</span>/5000
                            </div>
                        </div>
                        <div class="content-preview">
                            <div class="preview-label">预览</div>
                            <div id="edit-markdown-preview" class="markdown-content"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('edit-post-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitEditPost()">保存修改</button>
            </div>
        </div>
    </div>

    <!-- 页脚组件 -->
    <div id="app-footer"></div>

    <!-- 回到顶部 -->
    <div id="app-back-to-top"></div>

    <!-- 音乐播放器 -->
    <div id="app-sidebar-player"></div>

    <!-- 引入脚本 -->
    <script src="../js/api.js"></script>
    <script src="../js/main.js?v=3.5"></script>
    <script src="../js/back-to-top.js?v=1.0"></script>
    <script src="../js/navbar.js?v=1.0"></script>
    <script src="../js/sidebar-player.js?v=3.0"></script>
    <script src="../components/loader.js?v=3.0"></script>

    <script>
        // 全局变量
        let currentReplyPage = 1;
        const repliesPerPage = 10;
        let allReplies = [];
        let tocCollapsed = false;
        let tocItems = [];

        // 获取URL参数
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化 Mermaid
            mermaid.initialize({
                startOnLoad: false,
                theme: 'default',
                securityLevel: 'loose',
                fontFamily: 'Microsoft YaHei, Arial, sans-serif'
            });

            // 配置 marked.js
            const renderer = new marked.Renderer();
            
            // 自定义代码块渲染
            renderer.code = function(code, language) {
                // 如果是 mermaid 代码块，直接返回占位符，稍后渲染
                if (language === 'mermaid') {
                    return `<div class="mermaid-placeholder" data-mermaid="${encodeURIComponent(code)}"></div>`;
                }
                
                // 其他代码块正常高亮
                let highlightedCode = code;
                if (language && hljs.getLanguage(language)) {
                    try {
                        highlightedCode = hljs.highlight(code, { language: language }).value;
                    } catch (err) {
                        console.error('Highlight.js 错误:', err);
                        highlightedCode = hljs.highlightAuto(code).value;
                    }
                } else {
                    highlightedCode = hljs.highlightAuto(code).value;
                }
                
                return `<pre><code class="language-${language || 'plaintext'}">${highlightedCode}</code></pre>`;
            };
            
            marked.setOptions({
                renderer: renderer,
                gfm: true,
                breaks: false,
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (err) {
                            console.error('Highlight.js 错误:', err);
                        }
                    }
                    return hljs.highlightAuto(code).value;
                }
            });

            const postId = getUrlParameter('id');
            if (postId) {
                loadPostDetail(postId);
                loadReplies(postId);
            } else {
                showToast('帖子ID无效', 'error');
                setTimeout(() => {
                    window.location.href = 'forum.html';
                }, 1500);
            }
            updateLoginButton();
            initReplyCharCount();
        });

        // 初始化回复字数统计
        function initReplyCharCount() {
            const replyContent = document.getElementById('reply-content');
            const charCount = document.getElementById('reply-char-count');

            if (replyContent && charCount) {
                replyContent.addEventListener('input', function () {
                    const currentLength = this.value.length;
                    const maxLength = 500;
                    charCount.textContent = currentLength;

                    if (currentLength >= maxLength) {
                        charCount.style.color = '#e74c3c';
                    } else {
                        charCount.style.color = '#666';
                    }
                });
            }
        }

        // 加载帖子详情
        async function loadPostDetail(postId) {
            try {
                // 加载所有帖子
                const response = await fetch('../api/forum.php');
                const result = await response.json();

                if (result.success) {
                    const posts = result.data.posts || [];
                    const post = posts.find(p => p.id === postId);

                    if (post) {
                        // 加载帖子内容
                        try {
                            const contentResponse = await fetch(`../data/content/${post.content_file}`);
                            let markdownContent = await contentResponse.text();

                            // 保护 LaTeX 公式，避免被 marked.js 转义
                            // 使用 HTML 注释作为占位符，这样 marked.js 不会处理它们
                            const latexFormulas = [];
                            const protectedMarkdown = markdownContent.replace(/\$\$([\s\S]+?)\$\$/g, (match, formula) => {
                                const index = latexFormulas.length;
                                latexFormulas.push({type: 'block', formula: formula});
                                return `<!--LATEXBLOCK${index}-->`;
                            }).replace(/\$([^\$\n]+?)\$/g, (match, formula) => {
                                const index = latexFormulas.length;
                                latexFormulas.push({type: 'inline', formula: formula});
                                return `<!--LATEXINLINE${index}-->`;
                            });

                            const htmlContent = marked.parse(protectedMarkdown);

                            document.getElementById('post-title').textContent = post.title;
                            document.getElementById('post-meta').textContent = `作者: ${post.author} | 浏览: ${post.views} | ${post.created_at}`;
                            
                            // 恢复并渲染 LaTeX 公式
                            let contentWithLatex = htmlContent;
                            latexFormulas.forEach((item, index) => {
                                const {type, formula} = item;
                                const placeholder = type === 'block' 
                                    ? `<!--LATEXBLOCK${index}-->` 
                                    : `<!--LATEXINLINE${index}-->`;
                                
                                if (contentWithLatex.includes(placeholder)) {
                                    try {
                                        const rendered = katex.renderToString(formula.trim(), {
                                            displayMode: type === 'block',
                                            throwOnError: false,
                                            output: 'html'
                                        });
                                        const replacement = type === 'block' 
                                            ? `<div class="latex-block">${rendered}</div>`
                                            : rendered;
                                        contentWithLatex = contentWithLatex.split(placeholder).join(replacement);
                                    } catch (e) {
                                        console.error('LaTeX 渲染错误:', e);
                                        const errorReplacement = type === 'block' 
                                            ? `<div class="latex-error">$$${formula}$$</div>`
                                            : `$${formula}$`;
                                        contentWithLatex = contentWithLatex.split(placeholder).join(errorReplacement);
                                    }
                                }
                            });
                            
                            document.getElementById('post-content').innerHTML = contentWithLatex;

                            // 处理渲染后的内容（高亮 + 增强代码块）
                            processRenderedContent();

                            // 为标题添加锚点ID
                            addHeadingAnchors();

                            // 生成目录
                            generateTOC();

                            // 初始化滚动监听
                            initScrollSpy();

                            // 显示操作按钮
                            const currentUser = getCurrentUser();
                            const isAdmin = currentUser && currentUser.role === 'admin';
                            const isAuthor = currentUser && currentUser.username === post.author;

                            let actionsHtml = '<button class="btn btn-sm btn-outline" onclick="window.location.href=\'forum.html\'">返回论坛</button>';
                            if (isAuthor) {
                                actionsHtml += `<button class="btn btn-sm btn-outline" style="color: #3498db; margin-left: 10px;" onclick="openEditPostModal('${post.id}', '${post.title}')">编辑</button>`;
                            }
                            if (isAdmin || isAuthor) {
                                actionsHtml += `<button class="btn btn-sm btn-outline" style="color: #e74c3c; margin-left: 10px;" onclick="deletePost('${post.id}', '${post.author}')">删除</button>`;
                            }
                            document.getElementById('post-actions').innerHTML = actionsHtml;

                        } catch (error) {
                            console.error('加载帖子内容失败:', error);
                            document.getElementById('post-content').textContent = '内容加载失败';
                        }
                    } else {
                        showToast('帖子不存在', 'error');
                        setTimeout(() => {
                            window.location.href = 'forum.html';
                        }, 1500);
                    }
                }
            } catch (error) {
                console.error('加载帖子详情失败:', error);
                showToast('加载失败，请重试', 'error');
            }
        }

        // 加载回复列表
        async function loadReplies(postId) {
            try {
                const response = await fetch(`../api/forum.php?action=get_replies&postId=${postId}`);
                const result = await response.json();

                const repliesContainer = document.getElementById('replies-list');

                if (result.success) {
                    allReplies = result.data.replies || [];

                    // 重置当前页码
                    currentReplyPage = 1;

                    // 显示当前页回复
                    displayReplies(postId);
                    // 生成分页控件
                    generateRepliesPagination();
                } else {
                    repliesContainer.innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 20px;">回复加载失败</p>';
                }
            } catch (error) {
                console.error('加载回复失败:', error);
                const repliesContainer = document.getElementById('replies-list');
                if (repliesContainer) {
                    repliesContainer.innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 20px;">回复加载失败</p>';
                }
            }
        }

        // 显示回复列表
        function displayReplies(postId) {
            const repliesContainer = document.getElementById('replies-list');
            if (!repliesContainer) return;

            // 计算当前页的回复
            const startIndex = (currentReplyPage - 1) * repliesPerPage;
            const endIndex = startIndex + repliesPerPage;
            const currentReplies = allReplies.slice(startIndex, endIndex);

            if (currentReplies.length === 0) {
                if (allReplies.length === 0) {
                    repliesContainer.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">暂无回复</p>';
                } else {
                    repliesContainer.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">当前页没有回复</p>';
                }
                return;
            }

            repliesContainer.innerHTML = '';

            currentReplies.forEach(reply => {
                const replyElement = document.createElement('div');
                replyElement.className = 'reply-item';
                replyElement.style = 'padding: 15px; border-bottom: 1px solid #f0f0f0; background-color: #f9f9f9; border-radius: 5px; margin-bottom: 10px;';
                const replyHtmlContent = marked.parse(reply.content);

                // 检查是否显示删除按钮
                const currentUser = getCurrentUser();
                const userRole = currentUser ? (currentUser.role || 'user') : 'user';
                const canDelete = currentUser && (userRole === 'admin' || currentUser.username === reply.author);
                const deleteButton = canDelete ?
                    `<button onclick="deleteReply('${postId}', '${reply.id}', '${reply.author}')" 
                            style="margin-left: 10px; padding: 4px 8px; font-size: 12px; 
                                   background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">
                        删除
                    </button>` : '';

                // 创建临时元素获取纯文本内容长度
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = replyHtmlContent;
                const plainText = tempDiv.textContent || tempDiv.innerText || '';
                const maxLength = 150;
                const isLongContent = plainText.length > maxLength;

                // 创建内容元素
                const contentElement = document.createElement('div');
                contentElement.className = 'reply-content';
                contentElement.style = 'margin: 0 0 10px 0; line-height: 1.5; word-wrap: break-word; word-break: break-word; overflow-wrap: break-word; white-space: normal;';

                if (isLongContent) {
                    // 截断内容
                    const tempDiv2 = document.createElement('div');
                    tempDiv2.innerHTML = replyHtmlContent;
                    const truncatedHtml = tempDiv2.textContent.substring(0, maxLength) + '...';
                    contentElement.innerHTML = truncatedHtml;

                    // 添加展开按钮
                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = 'btn btn-sm btn-outline';
                    toggleBtn.style = 'margin-top: 5px;';
                    toggleBtn.textContent = '展开详情';
                    toggleBtn.onclick = function () {
                        if (toggleBtn.textContent === '展开详情') {
                            contentElement.innerHTML = replyHtmlContent;
                            toggleBtn.textContent = '收起';
                            // 展开后处理代码块
                            processRenderedContent();
                        } else {
                            contentElement.innerHTML = truncatedHtml;
                            toggleBtn.textContent = '展开详情';
                        }
                    };

                    replyElement.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <div>
                                <strong style="color: var(--primary-color);">${reply.author}</strong>
                                <span style="font-size: 0.9em; color: #999;">${reply.created_at}</span>
                                ${deleteButton}
                            </div>
                        </div>
                    `;
                    replyElement.appendChild(contentElement);
                    replyElement.appendChild(toggleBtn);
                } else {
                    // 完整显示内容
                    contentElement.innerHTML = replyHtmlContent;
                    replyElement.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <div>
                                <strong style="color: var(--primary-color);">${reply.author}</strong>
                                <span style="font-size: 0.9em; color: #999;">${reply.created_at}</span>
                                ${deleteButton}
                            </div>
                        </div>
                    `;
                    replyElement.appendChild(contentElement);
                }

                repliesContainer.appendChild(replyElement);
            });

            // 处理渲染后的内容（高亮 + 增强代码块）
            processRenderedContent();
        }

        // 生成回复分页控件
        function generateRepliesPagination() {
            const paginationContainer = document.getElementById('replies-pagination');
            if (!paginationContainer) return;

            const totalPages = Math.ceil(allReplies.length / repliesPerPage);

            // 清空现有分页
            paginationContainer.innerHTML = '';

            if (totalPages <= 1) {
                paginationContainer.innerHTML = '<p style="color: #666;">共 1 页</p>';
                return;
            }

            // 生成分页按钮
            let paginationHTML = '<div style="display: flex; justify-content: center; align-items: center; gap: 5px;">';

            // 上一页按钮
            if (currentReplyPage > 1) {
                paginationHTML += `<button class="btn btn-sm btn-outline" onclick="changeReplyPage(${currentReplyPage - 1})">&laquo; 上一页</button>`;
            }

            // 页码按钮
            const startPage = Math.max(1, currentReplyPage - 2);
            const endPage = Math.min(totalPages, startPage + 4);

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentReplyPage) {
                    paginationHTML += `<button class="btn btn-sm btn-primary">${i}</button>`;
                } else {
                    paginationHTML += `<button class="btn btn-sm btn-outline" onclick="changeReplyPage(${i})">${i}</button>`;
                }
            }

            // 下一页按钮
            if (currentReplyPage < totalPages) {
                paginationHTML += `<button class="btn btn-sm btn-outline" onclick="changeReplyPage(${currentReplyPage + 1})">下一页 &raquo;</button>`;
            }

            paginationHTML += '</div>';
            paginationHTML += `<p style="margin-top: 10px; color: #666;">共 ${totalPages} 页，当前第 ${currentReplyPage} 页</p>`;

            paginationContainer.innerHTML = paginationHTML;
        }

        // 切换回复页码
        function changeReplyPage(page) {
            currentReplyPage = page;
            displayReplies();
            generateRepliesPagination();
            // 滚动到回复列表顶部
            document.getElementById('replies-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 提交回复
        async function submitReply() {
            const postId = getUrlParameter('id');
            const content = document.getElementById('reply-content').value.trim();

            if (!content) {
                showToast('请输入回复内容', 'error');
                return;
            }

            try {
                const currentUser = getCurrentUser();
                if (!currentUser) {
                    showToast('请先登录', 'error');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                    return;
                }

                const response = await fetch('../api/forum.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'reply',
                        postId: postId,
                        content: content,
                        author: currentUser.username
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showToast('回复成功！', 'success');
                    document.getElementById('reply-content').value = '';
                    loadReplies(postId);
                } else {
                    showToast(result.message || '回复失败', 'error');
                }
            } catch (error) {
                console.error('提交回复失败:', error);
                showToast('回复失败，请重试', 'error');
            }
        }

        // 删除回复
        async function deleteReply(postId, replyId, replyAuthor) {
            const currentUser = getCurrentUser();

            if (!currentUser) {
                showToast('请先登录', 'error');
                return;
            }

            // 检查权限
            const userRole = currentUser.role || 'user';
            if (userRole !== 'admin' && currentUser.username !== replyAuthor) {
                showToast('无权限删除此回复', 'error');
                return;
            }

            // 确认删除
            if (!confirm('确定要删除这条回复吗？')) {
                return;
            }

            try {
                const response = await fetch('../api/forum.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('authToken')}`
                    },
                    body: JSON.stringify({
                        action: 'delete_reply',
                        postId: postId,
                        replyId: replyId
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showToast('删除成功', 'success');
                    // 重新加载回复
                    loadReplies(postId);
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除回复失败:', error);
                showToast('删除失败，请重试', 'error');
            }
        }

        let currentEditingPostId = null;

        async function openEditPostModal(postId, currentTitle) {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                showToast('请先登录', 'error');
                return;
            }

            currentEditingPostId = postId;

            try {
                const response = await fetch(`../data/content/${postId}.md`);
                const markdownContent = await response.text();

                showToast('加载帖子内容失败', 'error');

        function updateEditCharCount() {
            const titleInput = document.getElementById('edit-post-title');
            const contentInput = document.getElementById('edit-post-content');
            const titleCharCount = document.getElementById('edit-title-char-count');
            const contentCharCount = document.getElementById('edit-content-char-count');
            const markdownPreview = document.getElementById('edit-markdown-preview');

            if (titleInput && titleCharCount) {
                titleCharCount.textContent = titleInput.value.length;
                if (titleInput.value.length >= 50) {
                    titleCharCount.style.color = '#e74c3c';
                } else {
                    titleCharCount.style.color = '#666';
                }
            }

            if (contentInput && contentCharCount && markdownPreview) {
                contentCharCount.textContent = contentInput.value.length;
                if (contentInput.value.length >= 5000) {
                    contentCharCount.style.color = '#e74c3c';
                } else {
                    contentCharCount.style.color = '#666';
                }

                if (typeof marked !== 'undefined') {
                    markdownPreview.innerHTML = marked.parse(contentInput.value);
                    // 处理渲染后的内容（高亮 + 增强代码块）
                    processRenderedContent();
                }
            }
        }

        // 生成目录
        function generateTOC() {
            const tocSidebar = document.getElementById('toc-sidebar');
            const tocList = document.getElementById('toc-list');
            const postContent = document.getElementById('post-content');

            if (!tocSidebar || !tocList || !postContent) return;

            // 从渲染后的HTML中提取标题（避免代码块中的注释被误解析）
            const headings = postContent.querySelectorAll('h1, h2, h3');

            if (headings.length === 0) {
                tocSidebar.style.display = 'none';
                return;
            }

            tocItems = [];
            tocList.innerHTML = '';

            headings.forEach((heading, index) => {
                const level = parseInt(heading.tagName.charAt(1));
                const text = heading.textContent.trim();
                const anchorId = heading.id || `heading-${index}`;
                
                // 确保标题有ID
                if (!heading.id) {
                    heading.id = anchorId;
                }

                tocItems.push({
                    id: anchorId,
                    text: text,
                    level: level
                });

                const li = document.createElement('li');
                li.className = `toc-item toc-level-${Math.min(level, 3)}`;
                li.innerHTML = `<a href="#${anchorId}" class="toc-link" onclick="scrollToHeading('${anchorId}', event)">${text}</a>`;
                tocList.appendChild(li);
            });

            tocSidebar.style.display = 'block';
        }

        // 切换目录显示/隐藏
        function toggleTOC() {
            const tocContent = document.getElementById('toc-content');
            const tocToggle = document.getElementById('toc-toggle');

            if (!tocContent || !tocToggle) return;

            tocCollapsed = !tocCollapsed;

            if (tocCollapsed) {
                tocContent.classList.add('collapsed');
                tocToggle.textContent = '展开';
            } else {
                tocContent.classList.remove('collapsed');
                tocToggle.textContent = '收起';
            }
        }

        // 滚动到标题
        function scrollToHeading(anchorId, event) {
            if (event) {
                event.preventDefault();
            }
            
            const element = document.getElementById(anchorId);
            if (element) {
                // 计算滚动位置，考虑顶部固定导航栏的高度
                const headerOffset = 100; // 顶部导航栏高度 + 一些间距
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });

                // 更新URL但不刷新页面
                history.pushState(null, null, `#${anchorId}`);
                
                // 高亮当前选中的目录项
                document.querySelectorAll('.toc-item').forEach(item => {
                    item.classList.remove('active');
                });
                const tocLink = document.querySelector(`.toc-link[href="#${anchorId}"]`);
                if (tocLink) {
                    tocLink.parentElement.classList.add('active');
                }
            }
        }

        // 为标题添加锚点ID
        function addHeadingAnchors() {
            const postContent = document.getElementById('post-content');
            if (!postContent) return;

            const headings = postContent.querySelectorAll('h1, h2, h3, h4, h5, h6');

            headings.forEach((heading, index) => {
                if (!heading.id) {
                    heading.id = `heading-${index}`;
                }
            });
        }

        // 监听滚动事件，高亮当前章节
        function initScrollSpy() {
            const postContent = document.getElementById('post-content');
            if (!postContent) return;

            const headings = postContent.querySelectorAll('h1, h2, h3');

            if (headings.length === 0) return;

            let ticking = false;

            window.addEventListener('scroll', () => {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        updateActiveHeading(headings);
                        ticking = false;
                    });
                    ticking = true;
                }
            });

            // 初始化时更新一次
            updateActiveHeading(headings);
        }

        // 更新当前活动的标题
        function updateActiveHeading(headings) {
            const scrollPosition = window.scrollY + 120; // 考虑顶部导航栏偏移
            let currentHeading = null;

            // 找到当前可见的标题
            headings.forEach((heading) => {
                const headingTop = heading.getBoundingClientRect().top + window.scrollY;
                if (scrollPosition >= headingTop) {
                    currentHeading = heading;
                }
            });

            // 更新目录高亮状态
            document.querySelectorAll('.toc-item').forEach(item => {
                item.classList.remove('active');
            });

            if (currentHeading) {
                const tocLink = document.querySelector(`.toc-link[href="#${currentHeading.id}"]`);
                if (tocLink) {
                    tocLink.parentElement.classList.add('active');
                    // 将当前目录项滚动到可视区域
                    tocLink.parentElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        }

        // 获取分类名称
        function getCategoryName(category) {
            const categoryNames = {
                'all': '全部',
                'general': '综合讨论',
                'guide': '攻略分享',
                'report': '举报反馈'
            };
            return categoryNames[category] || category;
        }

        // 滚动到评论区
        function scrollToReplies() {
            const repliesSection = document.getElementById('replies-section');
            if (repliesSection) {
                repliesSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 获取分类颜色
        function getCategoryColor(category) {
            const categoryColors = {
                'general': '#3498db',
                'guide': '#2ecc71',
                'report': '#e74c3c'
            };
            return categoryColors[category] || '#95a5a6';
        }

        // 增强代码块：添加行号和折叠功能
        function enhanceCodeBlocks() {
            const codeBlocks = document.querySelectorAll('.post-content pre, .reply-content pre, #markdown-preview pre, #edit-markdown-preview pre');

            codeBlocks.forEach(pre => {
                // 如果已经处理过，跳过
                if (pre.closest('.code-block-wrapper')) return;

                const code = pre.querySelector('code');
                if (!code) return;

                // 保存原始父节点引用
                const originalParent = pre.parentNode;
                const nextSibling = pre.nextSibling;

                // 获取语言
                const languageClass = code.className.match(/language-(\w+)/);
                const language = languageClass ? languageClass[1] : 'text';

                // 获取代码内容
                const codeText = code.textContent || '';
                const lines = codeText.split('\n');
                const lineCount = lines.length;

                // 处理代码内容，将每行代码包裹在 div 中以确保对齐
                let processedCode = '';
                const codeLines = code.innerHTML.split('\n');
                codeLines.forEach((line, index) => {
                    if (index < codeLines.length - 1 || line.trim() !== '') {
                        processedCode += `<div class="code-line">${line || ' '}</div>`;
                    }
                });
                code.innerHTML = processedCode;

                // 创建行号 HTML
                let lineNumbersHtml = '';
                for (let i = 1; i <= lineCount; i++) {
                    lineNumbersHtml += `<span>${i}</span>`;
                }

                // 判断是否需要折叠（超过15行）
                const needsCollapse = lineCount > 15;

                // 创建包装元素
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';

                // 创建头部
                const header = document.createElement('div');
                header.className = 'code-block-header';
                header.innerHTML = `
                    <span class="code-language">${language}</span>
                    <div class="code-block-actions">
                        ${needsCollapse ? `<button class="code-block-btn toggle-btn" onclick="toggleCodeBlock(this)" title="展开"><i class="fa-solid fa-chevron-down"></i></button>` : ''}
                        <button class="code-block-btn copy-btn" onclick="copyCodeBlock(this)" title="复制"><i class="fa-regular fa-copy"></i></button>
                    </div>
                `;

                // 创建内容区域
                const content = document.createElement('div');
                content.className = `code-block-content ${needsCollapse ? 'collapsed' : 'expanded'}`;

                // 创建带行号的代码区域
                const codeWithLines = document.createElement('div');
                codeWithLines.className = 'code-with-line-numbers';
                codeWithLines.innerHTML = `
                    <div class="line-numbers">${lineNumbersHtml}</div>
                    <div class="code-content"></div>
                `;

                // 将原始 pre 移动到 code-content 中
                const codeContent = codeWithLines.querySelector('.code-content');
                codeContent.appendChild(pre);

                content.appendChild(codeWithLines);

                // 添加渐变遮罩（用于折叠时）
                const overlay = document.createElement('div');
                overlay.className = 'code-block-overlay';
                content.appendChild(overlay);

                // 组装
                wrapper.appendChild(header);
                wrapper.appendChild(content);

                // 替换原始 pre - 使用保存的引用
                if (nextSibling) {
                    originalParent.insertBefore(wrapper, nextSibling);
                } else {
                    originalParent.appendChild(wrapper);
                }
            });
        }

        // 切换代码块展开/折叠
        function toggleCodeBlock(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const content = wrapper.querySelector('.code-block-content');

            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                content.classList.add('expanded');
                btn.innerHTML = '<i class="fa-solid fa-chevron-up"></i>';
                btn.title = '收起';
            } else {
                content.classList.remove('expanded');
                content.classList.add('collapsed');
                btn.innerHTML = '<i class="fa-solid fa-chevron-down"></i>';
                btn.title = '展开';
                // 滚动到代码块顶部
                wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 复制代码块内容
        function copyCodeBlock(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const code = wrapper.querySelector('code');
            const text = code.textContent || code.innerText;

            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.style.background = '#2ecc71';
                btn.style.borderColor = '#2ecc71';

                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '';
                    btn.style.borderColor = '';
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                }, 2000);
            });
        }

        // 修改 marked.js 渲染后的处理函数
        function processRenderedContent() {
            // 先进行高亮
            hljs.highlightAll();
            // 然后增强代码块
            enhanceCodeBlocks();
            // 渲染 Mermaid 图表
            renderMermaidDiagrams();
        }

        // 渲染 Mermaid 图表
        async function renderMermaidDiagrams() {
            const placeholders = document.querySelectorAll('.mermaid-placeholder');
            if (placeholders.length === 0) return;

            let diagramIndex = 0;

            for (const placeholder of placeholders) {
                const code = decodeURIComponent(placeholder.getAttribute('data-mermaid'));
                diagramIndex++;
                const diagramId = `mermaid-diagram-${diagramIndex}`;

                // 创建外层容器
                const wrapper = document.createElement('div');
                wrapper.className = 'mermaid-wrapper';
                wrapper.id = diagramId;

                // 创建头部
                const header = document.createElement('div');
                header.className = 'mermaid-header';

                // 标题
                const title = document.createElement('div');
                title.className = 'mermaid-title';
                title.innerHTML = `
                    <svg class="mermaid-title-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 3h18v2H3V3zm0 4h18v2H3V7zm0 4h18v2H3v-2zm0 4h12v2H3v-2z"/>
                    </svg>
                    <span>Mermaid 图表 #${diagramIndex}</span>
                `;

                // 操作按钮
                const actions = document.createElement('div');
                actions.className = 'mermaid-actions';
                actions.innerHTML = `
                    <button class="mermaid-btn" onclick="copyMermaidCode(this, '${encodeURIComponent(code)}')" title="复制代码">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                        </svg>
                        <span>复制</span>
                    </button>
                    <div class="mermaid-zoom-controls">
                        <button class="mermaid-zoom-btn" onclick="zoomMermaid('${diagramId}', -0.1)" title="缩小">−</button>
                        <span class="mermaid-zoom-level" id="zoom-level-${diagramId}">100%</span>
                        <button class="mermaid-zoom-btn" onclick="zoomMermaid('${diagramId}', 0.1)" title="放大">+</button>
                        <button class="mermaid-zoom-btn" onclick="resetMermaidZoom('${diagramId}')" title="重置">⟲</button>
                    </div>
                `;

                header.appendChild(title);
                header.appendChild(actions);

                // 创建内容区域
                const body = document.createElement('div');
                body.className = 'mermaid-body';
                body.style.setProperty('--mermaid-scale', '1.0');
                body.dataset.scale = '1.0';

                // 创建 mermaid div
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = code;
                body.appendChild(mermaidDiv);

                // 组装
                wrapper.appendChild(header);
                wrapper.appendChild(body);

                // 替换占位符
                placeholder.parentNode.replaceChild(wrapper, placeholder);
            }

            // 渲染所有 Mermaid 图表
            try {
                await mermaid.run({
                    querySelector: '.mermaid'
                });
                console.log('Mermaid 图表渲染完成');
            } catch (err) {
                console.error('Mermaid 渲染错误:', err);
            }
        }

        // Mermaid 缩放控制
        function zoomMermaid(diagramId, delta) {
            const wrapper = document.getElementById(diagramId);
            if (!wrapper) return;

            const body = wrapper.querySelector('.mermaid-body');
            let currentScale = parseFloat(body.dataset.scale) || 1.0;
            let newScale = currentScale + delta;

            // 限制缩放范围
            newScale = Math.max(0.5, Math.min(newScale, 2.0));

            body.style.setProperty('--mermaid-scale', newScale.toFixed(1));
            body.dataset.scale = newScale.toFixed(1);

            // 更新显示
            const zoomLevel = wrapper.querySelector('.mermaid-zoom-level');
            if (zoomLevel) {
                zoomLevel.textContent = Math.round(newScale * 100) + '%';
            }
        }

        function resetMermaidZoom(diagramId) {
            const wrapper = document.getElementById(diagramId);
            if (!wrapper) return;

            const body = wrapper.querySelector('.mermaid-body');
            body.style.setProperty('--mermaid-scale', '1.0');
            body.dataset.scale = '1.0';

            const zoomLevel = wrapper.querySelector('.mermaid-zoom-level');
            if (zoomLevel) {
                zoomLevel.textContent = '100%';
            }
        }

        // 复制 Mermaid 代码
        function copyMermaidCode(btn, encodedCode) {
            const code = decodeURIComponent(encodedCode);
            navigator.clipboard.writeText(code).then(() => {
                const originalText = btn.innerHTML;
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    <span>已复制</span>
                `;
                btn.style.background = 'rgba(76, 175, 80, 0.3)';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '';
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                showToast('复制失败', 'error');
            });
        }

    </script>
