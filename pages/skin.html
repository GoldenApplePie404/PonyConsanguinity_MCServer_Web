<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" type="image/png" href="../assets/img/m.webp">
    <link rel="shortcut icon" href="../assets/img/m.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮肤站 - 万驹同源 | Minecraft 服务器官网</title>
    <link rel="stylesheet" href="../css/style.css?v=3.19">
    <link rel="stylesheet" href="../css/font-awesome/all.min.css">
    <link rel="stylesheet" href="../css/sidebar-player.css?v=2.0">
    <link rel="preload" href="../assets/img/6.webp" as="image">
    <style>
        .skin-header {
            background: url('../assets/img/6.webp') center/cover no-repeat;
            color: #ffe68d;
            text-align: center;
            position: relative;
        }
        .skin-header .container {
            padding: 60px 20px;
        }
        .skin-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(255,230,141,0.4);
        }
        .skin-header p {
            font-size: 1.15rem;
            opacity: 0.9;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .skin-page { padding: 40px 0; background: #f5f3ef; }
        .skin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 1100px;
            margin: 0 auto;
            align-items: start;
        }

        /* 皮肤站卡片 */
        .skin-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e8e4dd;
            transition: all 0.3s ease;
        }
        .skin-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.08);
            border-color: #d0c8b8;
        }
        .skin-card-head {
            background: linear-gradient(135deg, #fff8f0, #fffbe6);
            padding: 32px 28px 24px;
            text-align: center;
            position: relative;
        }
        .skin-card-head::after {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #ff9a3c, #ffe68d);
        }
        .skin-card-icon {
            width: 64px; height: 64px; border-radius: 16px;
            background: linear-gradient(135deg, #ff9a3c, #ffe68d);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 28px; color: #fff;
            box-shadow: 0 4px 16px rgba(255,154,60,0.3);
        }
        .skin-card-title {
            font-size: 1.3rem; font-weight: 700;
            margin: 0 0 4px;
        }
        .skin-card-title a {
            background: linear-gradient(135deg, #ff9a3c, #ffe68d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .skin-card-title a:hover { opacity: 0.8; }
        .skin-card-desc {
            color: #888; font-size: 0.95rem;
            line-height: 1.7; padding: 20px 28px;
        }
        .skin-card-actions {
            padding: 18px 28px;
            background: #fafafa;
            border-top: 1px solid #eee;
            display: flex; gap: 12px; justify-content: center;
        }
        .skin-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 26px; border-radius: 25px;
            font-size: 0.95rem; font-weight: 600; text-decoration: none;
            transition: all 0.25s ease;
            border: none; cursor: pointer;
        }
        .skin-btn.primary {
            background: linear-gradient(135deg, #ff9a3c, #ffe68d);
            color: #fff;
            box-shadow: 0 4px 16px rgba(255,154,60,0.35);
        }
        .skin-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,154,60,0.45);
        }
        .skin-btn.secondary {
            background: #fff;
            color: #ff9a3c;
            border: 2px solid #ff9a3c;
        }
        .skin-btn.secondary:hover {
            background: linear-gradient(135deg, #fff8f0, #fffbe6);
            transform: translateY(-2px);
        }

        /* 视频卡片 */
        .video-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e8e4dd;
            transition: all 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.08);
        }
        .video-card-head {
            display: flex; align-items: center; gap: 10px;
            padding: 18px 22px;
            background: linear-gradient(135deg, #ff9a3c, #ffe68d);
            color: #fff; font-weight: 700; font-size: 1.1rem;
        }
        .video-card-head i { font-size: 20px; }
        .video-card-body { padding: 22px; }
        .video-wrap {
            position: relative; width: 100%;
            border-radius: 12px; overflow: hidden;
            background: #000;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
        }
        .video-wrap iframe {
            display: block; width: 100%; aspect-ratio: 16/9;
            border: none;
        }

        @media (max-width: 768px) {
            .skin-grid { grid-template-columns: 1fr; }
            .skin-header h1 { font-size: 1.8rem; }
            .skin-header p { font-size: 1rem; }
            .skin-page { padding: 20px 0; }
            .skin-card-head { padding: 24px 20px 18px; }
            .skin-card-desc, .skin-card-actions { padding: 16px 20px; }
            .skin-card-actions { flex-direction: column; }
            .skin-btn { justify-content: center; }
        }
    </style>
</head>
<body data-components="sidebarPlayer,backToTop,navbar,footer">

    <div id="app-navbar"></div>

    <div class="skin-header common-banner">
        <div class="container">
            <h1><i class="fas fa-paint-brush" style="margin-right:10px;"></i>皮肤站</h1>
            <p>让你的角色多一点个性~</p>
        </div>
    </div>

    <div class="skin-page">
        <div class="container">
            <div class="skin-grid">

                <div class="skin-card">
                    <div class="skin-card-head">
                        <div class="skin-card-icon"><i class="fas fa-palette"></i></div>
                        <h3 class="skin-card-title">
                            <a href="https://skin.eqmemory.cn/" target="_blank">Equestria Skin 皮肤站</a>
                        </h3>
                    </div>
                    <div class="skin-card-desc">
                        上传和更换你的专属皮肤，展示个性！支持多种皮肤格式，一键应用到游戏。
                    </div>
                    <div class="skin-card-actions">
                        <a href="https://skin.eqmemory.cn/skinlib/upload" target="_blank" class="skin-btn primary">
                            <i class="fas fa-upload"></i> 上传皮肤
                        </a>
                        <a href="https://skin.eqmemory.cn/skinlib?filter=skin&sort=time&page=1" target="_blank" class="skin-btn secondary">
                            <i class="fas fa-images"></i> 浏览皮肤
                        </a>
                    </div>
                </div>

                <div class="video-card">
                    <div class="video-card-head">
                        <i class="fas fa-video"></i> 进服教程视频
                    </div>
                    <div class="video-card-body">
                        <div class="video-wrap">
                            <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116079443580198&bvid=BV1TXZTBVE7L&cid=36101229255&p=1" allowfullscreen="true"></iframe>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="app-footer"></div>

    <script src="../js/main.js?v=3.4"></script>

</body>
</html>
