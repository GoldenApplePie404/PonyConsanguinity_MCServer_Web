        const McpModule = { tools: [], selectedTool: null };

        async function connectMcpConsole() {
            document.getElementById('mcpStatus').innerHTML = '<span style="color:var(--warning);">●</span> 连接中...';
            try {
                const tools = await McpClient.listTools();
                McpModule.tools = tools;
                document.getElementById('mcpStatus').innerHTML = '<span style="color:var(--success);">●</span> 已连接 · ' + McpModule.tools.length + ' 个工具';
                renderMcpToolList();
            } catch (e) {
                document.getElementById('mcpStatus').innerHTML = '<span style="color:var(--danger);">●</span> 连接失败';
                document.getElementById('mcpToolList').innerHTML = '<div style="font-size:12px;color:var(--danger);padding:8px;">连接失败: ' + e.message + '</div>';
            }
        }

        function renderMcpToolList() {
            const list = document.getElementById('mcpToolList');
            if (!McpModule.tools.length) { list.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px;">暂无可用工具</div>'; return; }
            list.innerHTML = McpModule.tools.map(t => `
    <div onclick="selectMcpTool('${t.name}')" id="mcp-tool-${t.name}" style="padding:10px 12px;border:1px solid var(--border-color);border-radius:6px;margin-bottom:4px;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border-color)'">
      <div style="font-size:13px;font-weight:500;color:var(--text-primary);">${t.name}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${t.description?.substring(0, 60) || '无描述'}</div>
    </div>`).join('');
        }

        function selectMcpTool(name) {
            McpModule.selectedTool = McpModule.tools.find(t => t.name === name);
            if (!McpModule.selectedTool) return;
            document.querySelectorAll('[id^="mcp-tool-"]').forEach(el => el.style.borderColor = 'var(--border-color)');
            const el = document.getElementById('mcp-tool-' + name);
            if (el) el.style.borderColor = 'var(--accent)';

            document.getElementById('mcpToolTitle').textContent = '工具: ' + name;
            document.getElementById('mcpResult').style.display = 'none';
            document.getElementById('mcpExecBtn').style.display = 'block';

            const schema = McpModule.selectedTool.inputSchema?.properties || {};
            const required = McpModule.selectedTool.inputSchema?.required || [];
            const keys = Object.keys(schema);
            if (!keys.length) {
                document.getElementById('mcpParamForm').innerHTML = '<p style="font-size:12px;color:var(--text-muted);">该工具无需参数</p>';
                return;
            }
            document.getElementById('mcpParamForm').innerHTML = keys.map(k => `
    <div class="nt-form-group">
      <label>${k} ${required.includes(k) ? '<span style="color:var(--danger);">*</span>' : ''}</label>
      <input type="text" id="mcp-param-${k}" placeholder="${schema[k]?.description || k}" data-required="${required.includes(k)}" style="class="panel-input" style="padding:8px 12px;">
    </div>`).join('');
        }

        async function executeMcpTool() {
            if (!McpModule.selectedTool) return;
            const args = {};
            const inputs = document.querySelectorAll('[id^="mcp-param-"]');
            inputs.forEach(inp => {
                const key = inp.id.replace('mcp-param-', '');
                const val = inp.value.trim();
                if (val) args[key] = val;
            });

            document.getElementById('mcpExecBtn').disabled = true;
            document.getElementById('mcpExecBtn').innerHTML = '<span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:6px;"></span> 执行中...';

            try {
                const result = await McpClient.request('tools/call', { name: McpModule.selectedTool.name, arguments: args });
                const output = result.result || result.error || result;
                document.getElementById('mcpResult').style.display = 'block';
                document.getElementById('mcpResultContent').textContent = JSON.stringify(output, null, 2);
            } catch (e) {
                document.getElementById('mcpResult').style.display = 'block';
                document.getElementById('mcpResultContent').textContent = '执行失败: ' + e.message;
            } finally {
                document.getElementById('mcpExecBtn').disabled = false;
                document.getElementById('mcpExecBtn').innerHTML = '<i class="fas fa-play"></i> 执行';
            }
        }

        // ── 外部页面加载器（备选） ──────────────────
        async function renderExternalPage(page, content) {
            try {
                const resp = await fetch(page.file);
                const html = await resp.text();

                // 提取 body 内容（去掉外部 html/head/body 壳）
                let bodyHtml = html;
                const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                if (bodyMatch) bodyHtml = bodyMatch[1];

                // 移除 navbar/footer placeholder（由 admin-hub 统一管理）
                bodyHtml = bodyHtml.replace(/<div\s+id="(navbar|footer)-placeholder"[^>]*><\/div>/gi, '');

                // 提取样式（去重）
                const styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
                let styleMatch;
                while ((styleMatch = styleRegex.exec(html)) !== null) {
                    const styleId = 'ext-' + hashStr(styleMatch[1].substring(0, 80));
                    if (!STORE.loadedStyles.has(styleId)) {
                        STORE.loadedStyles.add(styleId);
                        const styleEl = document.createElement('style');
                        styleEl.id = styleId;
                        // 注入主题变量以便子页面样式适配
                        styleEl.textContent = styleMatch[1];
                        document.head.appendChild(styleEl);
                    }
                }

                // 注入 HTML
                content.innerHTML = bodyHtml;

                // 移除旧的子页面脚本标记（清理）
                document.querySelectorAll('script[data-ext-page]').forEach(s => s.remove());

                // 提取并执行脚本
                const scriptRegex = /<script([^>]*)>([\s\S]*?)<\/script>/gi;
                while ((scriptMatch = scriptRegex.exec(html)) !== null) {
                    const attrs = scriptMatch[1];
                    const code = scriptMatch[2]?.trim();
                    // 跳过外部库
                    if (attrs.includes('src=')) continue;
                    if (!code) continue;

                    const script = document.createElement('script');
                    script.setAttribute('data-ext-page', page.title);
                    if (attrs) {
                        // 复制属性
                        const attrRegex = /(\w+)(?:="([^"]*)")?/g;
                        let m;
                        while ((m = attrRegex.exec(attrs)) !== null) {
                            if (m[1] !== 'src' && m[2]) script.setAttribute(m[1], m[2]);
                        }
                    }
                    script.textContent = code;
                    document.body.appendChild(script);
                }
            } catch (e) {
                content.innerHTML = `<div style="padding:40px;text-align:center;color:var(--danger);">
      <i class="fas fa-exclamation-circle" style="font-size:40px;margin-bottom:16px;display:block;"></i>
      页面加载失败: ${e.message}</div>`;
            }
        }

        // ── 辅助：字符串哈希（用于样式去重） ────────────
        function hashStr(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i), h |= 0;
            return 'h' + Math.abs(h).toString(36);
        }

            document.getElementById('themeToggle').innerHTML = saved === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        function toggleTheme() {
            const curr = document.documentElement.getAttribute('data-theme') || 'light';
            const next = curr === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem(THEME_KEY, next);
            document.getElementById('themeToggle').innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        // ── Toast ──────────────────────────────────────
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            const icons = { error: 'fa-times-circle', success: 'fa-check-circle', info: 'fa-info-circle' };
            t.innerHTML = '<i class="fas ' + (icons[type] || icons.info) + '"></i> ' + msg;
            c.appendChild(t);
            setTimeout(() => { t.style.animation = 'toastIn 0.3s reverse forwards'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        // ── 统计加载 ──────────────────────────────────
        async function loadStats() {
            try {
                const t = localStorage.getItem('authToken');
                const r = await fetch('../api/admin/data_api.php?action=overview&token=' + t);
                const d = await r.json();
                if (d.success) {
                    ['Users', 'Posts', 'Replies', 'Images'].forEach(k => {
                        const el = document.getElementById('stat' + k);
                        if (el) el.textContent = d.data[k.toLowerCase()] || 0;
                    });
                }
            } catch (e) { console.error('Stats load error:', e); }
        }

        // ── 管理员验证 ────────────────────────────────
        async function verifyAdminSession() {
            try {
                const token = localStorage.getItem('authToken');
                const r = await fetch('../api/admin/data_api.php?action=overview&token=' + encodeURIComponent(token || ''));
                const d = await r.json();
                if (!d.success) { showToast('管理员验证失败，请重新登录', 'error'); setTimeout(() => window.location.href = '../pages/login.html', 1500); return false; }
                return true;
            } catch (e) { showToast('网络错误，无法验证管理员身份', 'error'); setTimeout(() => window.location.href = '../pages/profile.html', 1500); return false; }
        }

        function doLogout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            window.location.href = '../pages/login.html';
        }

        // ── 事件绑定 ──────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {

            loadTheme();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('menuBtn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('sidebarOverlay').classList.toggle('show');
            });
            document.getElementById('sidebarOverlay').addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });

            // 侧栏导航点击 → SPA 切换
            document.querySelectorAll('.nav-item[data-page]').forEach(el => {
                el.addEventListener('click', e => {
                    e.preventDefault();
                    const page = el.getAttribute('data-page');
                    if (PAGES[page]?.external && !PAGES[page]?.render) {
                        window.open(PAGES[page].external, '_blank');
                    } else {
                        navigate(page);
                    }
                });
            });

            // 浏览器前进/后退
            window.addEventListener('popstate', () => {
                const page = location.hash.replace('#/', '') || 'dashboard';
                if (PAGES[page]) navigate(page);
            });

            // 权限检查
            const user = getCurrentUser();
            if (!user || user.role !== 'admin') {
                showToast('权限不足，需要管理员权限', 'error');
                setTimeout(() => window.location.href = '../pages/profile.html', 1500);
                return;
            }
            const verified = await verifyAdminSession();
            if (!verified) return;

            document.getElementById('sidebarUserName').textContent = user.username;
            document.getElementById('sidebarAvatar').textContent = user.username.charAt(0).toUpperCase();

            // 初始页面
            const initialPage = location.hash.replace('#/', '') || 'dashboard';
            navigate(PAGES[initialPage] ? initialPage : 'dashboard');
        });

        // ── 商城管理 ──────────────────────────────
        let shopProductList = [];

        function renderShopManager(page, content) {
            shopProductList = [];
            content.innerHTML = pageHeader("fas fa-shopping-cart", "商城管理", "商品管理 · 上下架 · 新增编辑 · 价格调整", "var(--accent)", "") + `
                <div style="margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="nt-btn primary" onclick="shopShowCreate()"><i class="fas fa-plus"></i> 新增商品</button>
                    <button class="nt-btn secondary" onclick="shopLoadList()"><i class="fas fa-sync"></i> 刷新</button>
                </div>
                <div class="module-card" style="border-top:3px solid var(--accent);">
                    <h3 style="font-size:15px;font-weight:600;margin-bottom:14px;"><i class="fas fa-list" style="color:var(--accent);margin-right:8px;"></i>商品列表 <span id="shopCount" style="font-weight:400;font-size:13px;color:var(--text-muted);"></span></h3>
                    <div id="shopListContainer" style="min-height:100px;">加载中...</div>
                </div>

                <div class="modal-overlay" id="shopModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;align-items:center;justify-content:center;">
                    <div style="background:var(--bg-card);border-radius:16px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.25);">
                        <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;" id="shopModalTitle">新增商品</h3>
                        <input type="hidden" id="shopEditId">

                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                            <div style="margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">商品 ID <span style="color:red;">*</span></label>
                                <input type="text" id="shopFormId" placeholder="如 exp_pack" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;">
                                <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">创建后不可修改</div>
                            </div>
                            <div style="margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">商品名称 <span style="color:red;">*</span></label>
                                <input type="text" id="shopFormName" placeholder="经验值礼包" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;">
                            </div>
                            <div style="grid-column:1/-1;margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">描述</label>
                                <textarea id="shopFormDesc" placeholder="快速提升等级，获得 100 点经验值" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;resize:vertical;min-height:50px;"></textarea>
                            </div>
                            <div style="margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">价格（积分）</label>
                                <input type="number" id="shopFormPrice" value="50" min="0" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;">
                            </div>
                            <div style="margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">库存（-1=无限）</label>
                                <input type="number" id="shopFormStock" value="-1" min="-1" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;">
                            </div>
                            <div style="margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">等级要求</label>
                                <input type="number" id="shopFormLevel" value="0" min="0" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;">
                            </div>
                            <div style="margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">分类</label>
                                <select id="shopFormCategory" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;">
                                    <option value="hot">热销</option>
                                    <option value="new">新品</option>
                                    <option value="discount">特惠</option>
                                    <option value="privilege">特权</option>
                                    <option value="tool">工具</option>
                                </select>
                            </div>
                            <div style="margin-bottom:10px;">
                                <label style="font-size:13px;font-weight:600;display:block;margin-bottom:4px;">FA 图标</label>
                                <input type="text" id="shopFormStyle" value="fa-gift" placeholder="fa-chart-line" style="width:100%;padding:8px 10px;border:1.5px solid var(--border-color);border-radius:8px;font-size:13px;">
                            </div>
                        </div>

                        <div style="font-size:12px;color:var(--text-muted);background:var(--bg-secondary);border-radius:8px;padding:10px 14px;margin-top:4px;line-height:1.6;">
                            <strong><i class="fas fa-info-circle"></i> 提示：</strong>商品的购买效果（如加经验、加积分等）需要手动编写后端逻辑，见
                            <code style="background:var(--border-light);padding:1px 5px;border-radius:3px;">data/shop_items/</code>
                            目录下的商品文件，参考 <code style="background:var(--border-light);padding:1px 5px;border-radius:3px;">exp_pack.json</code>
                            的 <code style="background:var(--border-light);padding:1px 5px;border-radius:3px;">effect</code> 字段格式。
                        </div>

                        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px;border-top:1px solid var(--border-color);padding-top:16px;">
                            <button class="nt-btn" onclick="shopCloseModal()">取消</button>
                            <button class="nt-btn primary" onclick="shopSave()"><i class="fas fa-check"></i> 保存</button>
                        </div>
                    </div>
                </div>
            `;
            shopLoadList();
        }

        window.shopLoadList = async function() {
            try {
                const token = localStorage.getItem('authToken');
                const r = await fetch('../api/points/shop_admin.php?action=list&token=' + encodeURIComponent(token || ''));
                const d = await r.json();
                const el = document.getElementById('shopListContainer');
                const cnt = document.getElementById('shopCount');
                if (!d.success) { el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-muted);">加载失败</div>'; return; }
                shopProductList = d.data.products || [];
                if (cnt) cnt.textContent = '（共 ' + shopProductList.length + ' 件商品）';
                if (!shopProductList.length) { el.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-muted);">暂无商品</div>'; return; }
                el.innerHTML = shopProductList.map(p => {
                    const onSale = p.status === 'on_sale';
                    return '<div style="display:flex;align-items:center;gap:12px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:10px;padding:14px 16px;margin-bottom:8px;">' +
                        '<div style="font-size:1.6rem;width:44px;text-align:center;"><i class="fas ' + (p.style||'fa-gift') + '"></i></div>' +
                        '<div style="flex:1;min-width:0;">' +
                            '<div style="font-weight:600;font-size:14px;color:var(--text-primary);">' + (p.name||'') + ' <span style="font-weight:400;font-size:11px;color:#999;">(' + (p.id||'') + ')</span></div>' +
                            '<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">' + ((p.description||'').substring(0,40)) + ((p.description||'').length>40?'...':'') + '</div>' +
                            '<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">' +
                                '<span style="color:var(--accent);font-weight:600;">' + (p.price||0) + '</span> 积分 · ' +
                                '库存 ' + (p.stock===-1?'∞':p.stock) + ' · ' +
                                '已售 ' + (p.sold||0) + ' · ' +
                                (p.level_requirement ? '等级 ' + p.level_requirement + ' · ' : '') +
                                '<span style="color:' + (onSale?'#27ae60':'#e74c3c') + ';font-weight:500;">' + (onSale ? '上架中' : '已下架') + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<div style="display:flex;gap:4px;flex-shrink:0;">' +
                            '<button class="nt-btn secondary" onclick="shopToggle(\'' + p.id + '\')" style="padding:5px 10px;font-size:11px;" title="上下架">' + (onSale ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>') + '</button>' +
                            '<button class="nt-btn secondary" onclick="shopEdit(\'' + p.id + '\')" style="padding:5px 10px;font-size:11px;" title="编辑"><i class="fas fa-pen"></i></button>' +
                            '<button class="nt-btn danger" onclick="shopDelete(\'' + p.id + '\',\'' + (p.name||'') + '\')" style="padding:5px 10px;font-size:11px;" title="删除"><i class="fas fa-trash"></i></button>' +
                        '</div>' +
                    '</div>';
                }).join('');
            } catch(e) { console.error(e); document.getElementById('shopListContainer').innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-muted);">加载失败</div>'; }
        };

        window.shopShowCreate = function() {
            document.getElementById('shopModalTitle').textContent = '新增商品';
            document.getElementById('shopEditId').value = '';
            document.getElementById('shopFormId').value = '';
            document.getElementById('shopFormId').disabled = false;
            document.getElementById('shopFormName').value = '';
            document.getElementById('shopFormDesc').value = '';
            document.getElementById('shopFormPrice').value = '50';
            document.getElementById('shopFormStock').value = '-1';
            document.getElementById('shopFormLevel').value = '0';
            document.getElementById('shopFormCategory').value = 'hot';
            document.getElementById('shopFormStyle').value = 'fa-gift';
            document.getElementById('shopModal').style.display = 'flex';
        };

        window.shopEdit = function(id) {
            const p = shopProductList.find(x => x.id === id);
            if (!p) return;
            document.getElementById('shopModalTitle').textContent = '编辑商品';
            document.getElementById('shopEditId').value = p.id;
            document.getElementById('shopFormId').value = p.id;
            document.getElementById('shopFormId').disabled = true;
            document.getElementById('shopFormName').value = p.name || '';
            document.getElementById('shopFormDesc').value = p.description || '';
            document.getElementById('shopFormPrice').value = p.price || 0;
            document.getElementById('shopFormStock').value = p.stock ?? -1;
            document.getElementById('shopFormLevel').value = p.level_requirement || 0;
            document.getElementById('shopFormCategory').value = p.category || 'hot';
            document.getElementById('shopFormStyle').value = p.style || 'fa-gift';
            // effect 字段不在表单中设置，需手动编辑 JSON 文件
            document.getElementById('shopModal').style.display = 'flex';
        };

        window.shopCloseModal = function() {
            document.getElementById('shopModal').style.display = 'none';
        };

        window.shopSave = async function() {
            const isEdit = !!document.getElementById('shopEditId').value;
            const id = document.getElementById('shopFormId').value.trim();
            const name = document.getElementById('shopFormName').value.trim();
            if (!isEdit && !id) { showToast('请输入商品 ID', 'error'); return; }
            if (!name) { showToast('请输入商品名称', 'error'); return; }

            const data = {
                action: isEdit ? 'update' : 'create',
                id: id,
                name: name,
                description: document.getElementById('shopFormDesc').value.trim(),
                price: parseInt(document.getElementById('shopFormPrice').value) || 0,
                stock: parseInt(document.getElementById('shopFormStock').value) ?? -1,
                level_requirement: parseInt(document.getElementById('shopFormLevel').value) || 0,
                category: document.getElementById('shopFormCategory').value,
                style: document.getElementById('shopFormStyle').value.trim() || 'fa-gift',
                // effect 字段不在表单中设置，需手动编辑 JSON 文件
            };

            // 注入 token
            data.token = localStorage.getItem('authToken');

            try {
                const r = await fetch('../api/points/shop_admin.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const d = await r.json();
                if (d.success) {
                    showToast(d.message, 'success');
                    shopCloseModal();
                    shopLoadList();
                } else {
                    showToast(d.message, 'error');
                }
            } catch(e) { showToast('操作失败', 'error'); }
        };

        window.shopToggle = async function(id) {
            try {
                const token = localStorage.getItem('authToken');
                const r = await fetch('../api/points/shop_admin.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'toggle', id: id, token: token })
                });
                const d = await r.json();
                if (d.success) { showToast(d.message, 'success'); shopLoadList(); }
                else { showToast(d.message, 'error'); }
            } catch(e) { showToast('操作失败', 'error'); }
        };

        window.shopDelete = function(id, name) {
            if (!confirm('确定要删除商品「' + name + '」吗？此操作不可恢复。')) return;
            const token = localStorage.getItem('authToken');
            fetch('../api/points/shop_admin.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'delete', id: id, token: token })
            }).then(r => r.json()).then(d => {
                if (d.success) { showToast(d.message, 'success'); shopLoadList(); }
                else { showToast(d.message, 'error'); }
            }).catch(() => showToast('操作失败', 'error'));
        };

    </script>
</body>

</html>
